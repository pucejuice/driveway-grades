<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driveway Profiler</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --accent: #00e676; --text: #e0e0e0; --error: #ff5252; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #app-container { max-width: 1400px; margin: 0 auto; background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; transition: opacity 0.2s; }
        label { font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; font-weight: 700; }
        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; font-size: 0.9rem; }
        .checkbox-group { flex-direction: row; align-items: center; gap: 8px; padding-top: 25px; }
        .checkbox-group input { width: 16px; height: 16px; cursor: pointer; margin: 0; }
        .mini-btn { background: #333; color: var(--accent); border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .mini-btn:hover { background: #444; color: #fff; }
        svg { width: 100%; height: 450px; background: #000; border-radius: 8px; margin-top: 20px; border: 1px solid #222; cursor: crosshair; }
        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        button { padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: #333; color: #fff; }
        .status-msg { color: var(--error); font-weight: 700; font-size: 0.85rem; }
        .axis line, .axis path { stroke: #333; }
        .axis text { fill: #666; font-size: 11px; }
        .tooltip-text { fill: var(--accent); font-family: monospace; font-size: 13px; pointer-events: none; font-weight: bold; }
        .dim-text { fill: #aaa; font-size: 11px; text-anchor: middle; user-select: none; }
        .dim-grade { fill: var(--accent); font-size: 10px; text-anchor: middle; user-select: none; font-weight: bold; }
        .rl-text { fill: var(--accent); font-size: 10px; text-anchor: middle; font-family: monospace; user-select: none; }
        .scrape-warn { fill: var(--error); font-weight: 900; font-size: 14px; text-anchor: middle; pointer-events: none; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <h2 style="margin:0; color:var(--accent);">Driveway Profiler</h2>
        <div id="status" class="status-msg"></div>
    </div>
    
    <div class="controls">
        <div class="input-group"><label>Project</label><input type="text" id="projName" value="Driveway-Design"></div>
        <div class="input-group"><label>Street RL</label><input type="number" id="startElev" value="10.000" step="0.001"></div>
        
        <div class="input-group">
            <label>Garage RL</label>
            <input type="number" id="targetElev" value="9.000" step="0.001">
            <div style="display:flex; gap: 5px; margin-top: 6px;">
                <button class="mini-btn" onclick="calcMaxTarget(1)" style="flex:1; padding: 4px; font-size:0.65rem;" title="Auto-calculate Max Height">MAX ↑</button>
                <button class="mini-btn" onclick="calcMaxTarget(-1)" style="flex:1; padding: 4px; font-size:0.65rem;" title="Auto-calculate Max Depth">MAX ↓</button>
            </div>
        </div>

        <div class="input-group"><label>Length (m)</label><input type="number" id="totalLen" value="12.0" step="0.1"></div>
        <div class="input-group"><label>Max Grade ±%</label><input type="number" id="maxGrade" value="25.0" step="0.5"></div>
        <div class="input-group"><label>Ramp Len</label><input type="number" id="kerbLen" value="1.5" step="0.1"></div>
        <div class="input-group"><label>Ramp %</label><input type="number" id="kerbGrade" value="12.5" step="0.1"></div>
        
        <div class="input-group" id="fpWidthGroup"><label>FP Width</label><input type="number" id="fpWidth" value="1.5" step="0.1"></div>
        <div class="input-group" id="fpGradeGroup"><label>FP Grade %</label><input type="number" id="fpGrade" value="2.5" step="0.1"></div>
        
        <div class="input-group checkbox-group">
            <input type="checkbox" id="ignoreFp">
            <label style="margin:0; font-size:0.75rem;">No FP</label>
        </div>
        
        <div class="input-group checkbox-group">
            <input type="checkbox" id="forceCrest" checked>
            <label style="margin:0; font-size:0.75rem;" title="Ensure 250mm freeboard above street RL for downward sloping lots">Min. 250mm Crest</label>
        </div>

        <div class="input-group">
            <label>Template</label>
            <select id="vehicleType" onchange="render()">
                <option value="none">None</option>
                <option value="B85" selected>B85</option>
                <option value="B99">B99</option>
            </select>
        </div>
    </div>

    <svg id="profileDisplay"></svg>

    <div class="btn-group">
        <button class="btn-primary" onclick="exportDXF()">Download DXF</button>
        <button class="btn-secondary" onclick="saveProject()">Save JSON</button>
        <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">Load JSON</button>
        <input type="file" id="fileInput" style="display:none" onchange="loadProject(event)">
    </div>
</div>

<script id="worker-script" type="javascript/worker">
    const NL = String.fromCharCode(10);
    function _pt(p) { return `10${NL}${p.x.toFixed(4)}${NL}20${NL}${p.y.toFixed(4)}`; }
    
    self.onmessage = function(e) {
        const { pts, name } = e.data;
        let d = ['0','SECTION','2','ENTITIES'].join(NL);
        
        // Profile Polyline
        d += `${NL}0${NL}LWPOLYLINE${NL}8${NL}DESIGN${NL}62${NL}3${NL}90${NL}${pts.length}`;
        pts.forEach(p => d += `${NL}${_pt(p)}`);

        const keyPts = pts.filter(p => p.isKey);
        const maxY = Math.max(...pts.map(p => p.y));
        const dimY = maxY + 1.0; 

        keyPts.forEach((p, i) => {
            // Level Annotations
            d += `${NL}0${NL}TEXT${NL}8${NL}LEVELS${NL}62${NL}3${NL}10${NL}${p.x.toFixed(4)}${NL}20${NL}${(p.y - 0.2).toFixed(4)}${NL}40${NL}0.1${NL}72${NL}1${NL}11${NL}${p.x.toFixed(4)}${NL}21${NL}${(p.y - 0.2).toFixed(4)}${NL}1${NL}RL ${p.y.toFixed(3)}`;
            // Vertical Dimension Ticks
            d += `${NL}0${NL}LINE${NL}8${NL}DIMS${NL}62${NL}8${NL}10${NL}${p.x.toFixed(4)}${NL}20${NL}${(dimY-0.1).toFixed(4)}${NL}11${NL}${p.x.toFixed(4)}${NL}21${NL}${(dimY+0.1).toFixed(4)}`;

            if (i < keyPts.length - 1) {
                const nxt = keyPts[i+1];
                const dist = nxt.x - p.x;
                const midX = p.x + dist/2;
                
                // Horizontal Dimension Line
                d += `${NL}0${NL}LINE${NL}8${NL}DIMS${NL}62${NL}8${NL}10${NL}${p.x.toFixed(4)}${NL}20${NL}${dimY.toFixed(4)}${NL}11${NL}${nxt.x.toFixed(4)}${NL}21${NL}${dimY.toFixed(4)}`;
                // Length Text
                d += `${NL}0${NL}TEXT${NL}8${NL}DIMS${NL}62${NL}8${NL}10${NL}${midX.toFixed(4)}${NL}20${NL}${(dimY + 0.15).toFixed(4)}${NL}40${NL}0.1${NL}72${NL}1${NL}11${NL}${midX.toFixed(4)}${NL}21${NL}${(dimY + 0.15).toFixed(4)}${NL}1${NL}${dist.toFixed(2)}m`;
                // Grade Text
                if (p.nextLabel) {
                    d += `${NL}0${NL}TEXT${NL}8${NL}DIMS${NL}62${NL}3${NL}10${NL}${midX.toFixed(4)}${NL}20${NL}${(dimY + 0.04).toFixed(4)}${NL}40${NL}0.08${NL}72${NL}1${NL}11${NL}${midX.toFixed(4)}${NL}21${NL}${(dimY + 0.04).toFixed(4)}${NL}1${NL}${p.nextLabel}`;
                }
            }
        });

        d += `${NL}0${NL}ENDSEC${NL}0${NL}EOF`;
        self.postMessage({ dxf: d, file: name + ".dxf" });
    };
</script>

<script>
    const vehicles = {
        B85: { wheelbase: 2.8, frontOH: 0.92, rearOH: 1.19, groundClr: 0.12, height: 1.4 },
        B99: { wheelbase: 3.05, frontOH: 0.94, rearOH: 1.21, groundClr: 0.14, height: 1.5 }
    };
    let mouseX = -1;

    function getYYMMDD() {
        const now = new Date();
        const yy = String(now.getFullYear()).slice(-2);
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        return yy + mm + dd;
    }

    d3.select("#ignoreFp").on("change", function() {
        d3.select("#fpWidthGroup").style("display", this.checked ? "none" : "flex");
        d3.select("#fpGradeGroup").style("display", this.checked ? "none" : "flex");
        render();
    });

    d3.select("#forceCrest").on("change", render);

    // --- AUTO CALCULATE MAX BOUNDS ---
    function calcMaxTarget(direction) {
        const s = +d3.select("#startElev").property("value");
        const len = +d3.select("#totalLen").property("value");
        const kL = +d3.select("#kerbLen").property("value");
        const kG = +d3.select("#kerbGrade").property("value")/100;
        const fW = +d3.select("#fpWidth").property("value");
        const fG = +d3.select("#fpGrade").property("value")/100;
        const maxG = +d3.select("#maxGrade").property("value")/100;
        const noFP = d3.select("#ignoreFp").property("checked");
        const forceCrest = d3.select("#forceCrest").property("checked");

        let curX = kL;
        let curY = s + (kL * kG);
        let gStart = kG;

        if (!noFP) {
            curX += fW;
            curY += (fW * fG);
            gStart = fG;
        }

        if (direction < 0 && forceCrest && curY < s + 0.25) {
            const reqY = s + 0.25;
            const dist = (reqY - curY) / 0.05;
            curX += dist;
            curY = reqY;
            gStart = 0.0;
        }

        const x_rem = len - curX;
        if (x_rem < 3.0) {
            d3.select("#status").text("ERROR: Driveway too short for transitions.");
            return;
        }

        const mainG = maxG * direction;
        // Formula: Target RL = Entry RL + dY_trans1 + dY_main + dY_trans2
        const targetRL = curY + 0.75 * gStart + mainG * (x_rem - 1.5);
        
        d3.select("#targetElev").property("value", targetRL.toFixed(3));
        render();
    }

    function solve() {
        const cfg = {
            s: +d3.select("#startElev").property("value"),
            t: +d3.select("#targetElev").property("value"),
            len: +d3.select("#totalLen").property("value"),
            kL: +d3.select("#kerbLen").property("value"),
            kG: +d3.select("#kerbGrade").property("value")/100, 
            fW: +d3.select("#fpWidth").property("value"),
            fG: +d3.select("#fpGrade").property("value")/100, 
            maxG: +d3.select("#maxGrade").property("value")/100,
            noFP: d3.select("#ignoreFp").property("checked"),
            forceCrest: d3.select("#forceCrest").property("checked"),
            flat: 2.0, trans: 1.5
        };

        let res = [{x: 0, y: cfg.s, isKey: true, nextLabel: (cfg.kG * 100).toFixed(1) + "%"}];
        let curX = 0, curY = cfg.s;

        // 1. Kerb
        curX += cfg.kL; curY += (cfg.kL * cfg.kG); 
        res.push({x: curX, y: curY, isKey: true, nextLabel: !cfg.noFP ? (cfg.fG * 100).toFixed(1) + "%" : ""});

        // 2. Footpath
        let gStart = cfg.kG;
        if(!cfg.noFP) {
            curX += cfg.fW; curY += (cfg.fW * cfg.fG);
            res.push({x: curX, y: curY, isKey: true, nextLabel: ""});
            gStart = cfg.fG;
        }

        // 2.5 Queensland 250mm Crest Requirement Check
        if (cfg.forceCrest && cfg.t < cfg.s && curY < cfg.s + 0.25) {
            res[res.length - 1].nextLabel = "5.0%"; 
            const reqY = cfg.s + 0.25;
            const dist = (reqY - curY) / 0.05; 
            curX += dist;
            curY = reqY;
            res.push({x: curX, y: curY, isKey: true, nextLabel: ""});
            gStart = 0.0; 
        }

        const x_rem = cfg.len - curX;
        if (x_rem < 3.0) {
            d3.select("#status").text("ERROR: Driveway too short for transitions.");
            return res; 
        }
        
        const x_main = x_rem - (cfg.trans * 2); 
        const deltaY = cfg.t - curY;
        const mainG = (deltaY - 0.75 * gStart) / (x_main + 1.5);

        // Transition 1
        let gPrev = gStart;
        for(let i=1; i<=10; i++) {
            let gCurr = gStart + (mainG - gStart) * (i/10);
            curY += (cfg.trans/10) * (gPrev + gCurr) / 2;
            curX += (cfg.trans/10);
            res.push({x: curX, y: curY, isKey: i === 10, nextLabel: i === 10 ? (mainG * 100).toFixed(1) + "%" : undefined}); 
            gPrev = gCurr;
        }

        // Main Driveway
        curX += x_main; curY += (x_main * mainG);
        res.push({x: curX, y: curY, isKey: true, nextLabel: ""});

        // Transition 2
        gPrev = mainG;
        for(let i=1; i<=10; i++) {
            let gCurr = mainG + (0 - mainG) * (i/10);
            curY += (cfg.trans/10) * (gPrev + gCurr) / 2;
            curX += (cfg.trans/10);
            res.push({x: curX, y: curY, isKey: i === 10, nextLabel: i === 10 ? "0.0%" : undefined}); 
            gPrev = gCurr;
        }

        // 4. Garage Flat
        res.push({x: curX + cfg.flat, y: curY, isKey: true});
        
        // Epsilon added to avoid floating-point math false positives
        d3.select("#status").text(Math.abs(mainG) > cfg.maxG + 0.0001 ? `EXCEEDS ±${(cfg.maxG*100).toFixed(1)}%: ${(mainG*100).toFixed(1)}%` : "");
        return res;
    }

    function getInterpY(data, x) {
        if (x <= data[0].x) return data[0].y;
        if (x >= data[data.length-1].x) return data[data.length-1].y;
        const i = d3.bisector(d => d.x).left(data, x);
        const p1 = data[i-1], p2 = data[i];
        return p1.y + (x - p1.x) / (p2.x - p1.x) * (p2.y - p1.y);
    }

    function checkCollision(data, pX, v) {
        const rY = getInterpY(data, pX);
        const fX = pX + v.wheelbase;
        const fY = getInterpY(data, fX);
        const slope = (fY - rY) / v.wheelbase;
        const startX = pX - v.rearOH;
        const endX = pX + v.wheelbase + v.frontOH;
        const maxX = d3.max(data, d => d.x);

        for (let x = startX; x <= endX; x += 0.05) {
            if (x < 0 || x > maxX) continue; 
            const groundY = getInterpY(data, x);
            const chassisY = rY + v.groundClr + (x - pX) * slope;
            if (groundY > chassisY) return true; 
        }
        return false;
    }

    function render() {
        const data = solve();
        const svg = d3.select("#profileDisplay");
        const {width, height} = svg.node().getBoundingClientRect();
        const margin = {top: 70, right: 40, bottom: 40, left: 60}; 
        svg.selectAll("*").remove();

        if(data.length < 3) return;

        const totalX = d3.max(data, d=>d.x);
        const yExt = d3.extent(data, d=>d.y);
        
        // 1:1 TRUE SCALE
        const drawWidth = width - margin.left - margin.right;
        const metersPerPixel = totalX / drawWidth;
        const drawHeightMeters = (height - margin.top - margin.bottom) * metersPerPixel;
        const yCenter = (yExt[0] + yExt[1]) / 2;

        const xS = d3.scaleLinear().domain([0, totalX]).range([margin.left, width - margin.right]);
        const yS = d3.scaleLinear()
            .domain([yCenter - drawHeightMeters/2, yCenter + drawHeightMeters/2])
            .range([height - margin.bottom, margin.top]);

        // Draw Profile
        svg.append("path").datum(data).attr("fill", "none").attr("stroke", "#00e676").attr("stroke-width", 3).attr("d", d3.line().x(d => xS(d.x)).y(d => yS(d.y)));
        
        // DRAW LABELS & DIMENSIONS
        const keyPts = data.filter(d => d.isKey);
        const dimY = margin.top / 2;

        svg.selectAll(".rl-text").data(keyPts).enter().append("text").attr("class", "rl-text")
           .attr("x", d => xS(d.x)).attr("y", d => yS(d.y) + 18)
           .text(d => d.y.toFixed(3));

        svg.selectAll(".dim-line").data(keyPts.slice(0,-1)).enter().append("line")
           .attr("x1", d => xS(d.x)).attr("x2", (d,i) => xS(keyPts[i+1].x))
           .attr("y1", dimY).attr("y2", dimY).attr("stroke", "#555");
           
        svg.selectAll(".dim-tick").data(keyPts).enter().append("line")
           .attr("x1", d => xS(d.x)).attr("x2", d => xS(d.x))
           .attr("y1", dimY - 8).attr("y2", dimY + 8).attr("stroke", "#555");

        svg.selectAll(".dim-text").data(keyPts.slice(0,-1)).enter().append("text").attr("class", "dim-text")
           .attr("x", (d,i) => (xS(d.x) + xS(keyPts[i+1].x))/2).attr("y", dimY - 14)
           .text((d,i) => (keyPts[i+1].x - d.x).toFixed(2) + "m");

        svg.selectAll(".dim-grade").data(keyPts.slice(0,-1)).enter().append("text").attr("class", "dim-grade")
           .attr("x", (d,i) => (xS(d.x) + xS(keyPts[i+1].x))/2).attr("y", dimY - 2)
           .text(d => d.nextLabel || "");

        // Interactive Hover & Vehicle Checks
        const pX = xS.invert(mouseX);
        if(pX >= 0 && pX <= totalX && mouseX > 0) {
            const pY = getInterpY(data, pX);
            
            svg.append("line").attr("stroke", "#444").attr("stroke-dasharray", "4")
               .attr("x1", xS(pX)).attr("x2", xS(pX)).attr("y1", margin.top).attr("y2", height - margin.bottom);
            svg.append("circle").attr("cx", xS(pX)).attr("cy", yS(pY)).attr("r", 5).attr("fill", "#00e676");
            
            const textX = pX > totalX - 3 ? xS(pX) - 150 : xS(pX) + 15;
            svg.append("text").attr("class", "tooltip-text").attr("x", textX).attr("y", yS(pY) - 15)
               .text(`X: ${pX.toFixed(2)}m | RL: ${pY.toFixed(3)}m`);

            const vT = d3.select("#vehicleType").property("value");
            if(vT !== "none") {
                const v = vehicles[vT];
                const fW_X = pX + v.wheelbase;
                const rY = pY;
                const fY = getInterpY(data, fW_X);
                const angle = Math.atan2(fY - rY, v.wheelbase) * (180/Math.PI);

                const isScraping = checkCollision(data, pX, v);
                const carColor = isScraping ? "rgba(255, 0, 0, 0.7)" : "rgba(0, 230, 118, 0.4)";

                svg.append("rect")
                   .attr("x", xS(pX - v.rearOH)).attr("y", yS(rY + v.groundClr)) 
                   .attr("width", xS(v.wheelbase + v.frontOH + v.rearOH) - margin.left).attr("height", 4)
                   .attr("fill", carColor)
                   .attr("transform", `rotate(${-angle}, ${xS(pX)}, ${yS(rY)})`);

                if(isScraping) {
                    svg.append("text")
                       .attr("class", "scrape-warn")
                       .attr("x", xS(pX + v.wheelbase/2))
                       .attr("y", yS(rY + v.groundClr + 0.8))
                       .text("⚠️ SCRAPING DETECTED");
                }
            }
        }

        svg.append("g").attr("class","axis").attr("transform",`translate(0,${height-margin.bottom})`).call(d3.axisBottom(xS));
        svg.append("g").attr("class","axis").attr("transform",`translate(${margin.left},0)`).call(d3.axisLeft(yS));
        
        svg.append("rect").attr("width", width).attr("height", height).attr("fill", "transparent")
           .on("mousemove", (e) => { mouseX = d3.pointer(e)[0]; render(); })
           .on("mouseout", () => { mouseX = -1; render(); });
    }

    const blob = new Blob([document.getElementById('worker-script').textContent], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));
    function exportDXF() { 
        const dateSuffix = getYYMMDD();
        const baseName = d3.select("#projName").property("value") || "Driveway-Design";
        worker.postMessage({ pts: solve(), name: `${baseName}_${dateSuffix}` }); 
    }
    worker.onmessage = (e) => {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([e.data.dxf], { type: 'application/dxf' }));
        a.download = e.data.file; a.click();
    };

    function saveProject() {
        const s = {}; d3.selectAll("input").each(function() { s[this.id] = this.type==='checkbox'?this.checked:this.value; });
        const dateSuffix = getYYMMDD();
        const baseName = d3.select("#projName").property("value") || "Driveway-Design";
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(s)], {type:'application/json'}));
        a.download = `${baseName}_${dateSuffix}.json`; a.click();
    }

    function loadProject(e) {
        const r = new FileReader(); r.onload = (ev) => {
            const s = JSON.parse(ev.target.result); Object.keys(s).forEach(k => {
                const el = d3.select("#"+k); if(el.property("type")==='checkbox') el.property("checked", s[k]); else el.property("value", s[k]);
            }); 
            d3.select("#ignoreFp").dispatch('change');
            d3.select("#forceCrest").dispatch('change');
            render();
        }; r.readAsText(e.target.files[0]);
    }

    d3.selectAll("input").on("input", render);
    d3.select("#ignoreFp").dispatch('change');
    d3.select("#forceCrest").dispatch('change');
    render();
    window.addEventListener('resize', render);
</script>
</body>
</html>
