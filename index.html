<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driveway Profiler</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --accent: #00e676; --text: #e0e0e0; --error: #ff5252; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #app-container { max-width: 1400px; margin: 0 auto; background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; font-weight: 700; }
        input, select { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; font-size: 0.9rem; }
        svg { width: 100%; height: 500px; background: #000; border-radius: 8px; margin-top: 20px; border: 1px solid #222; }
        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        button { padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: #333; color: #fff; }
        .status-msg { color: var(--error); font-weight: 700; font-size: 0.85rem; }
        .axis line, .axis path { stroke: #333; }
        .axis text { fill: #666; font-size: 11px; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="header">
        <h2 style="margin:0; color:var(--accent);">Driveway Solver Pro</h2>
        <div id="status" class="status-msg"></div>
    </div>
    
    <div class="controls">
        <div class="input-group"><label>Project</label><input type="text" id="projName" value="Garage-Design-01"></div>
        <div class="input-group"><label>Street RL</label><input type="number" id="startElev" value="10.000" step="0.001"></div>
        <div class="input-group"><label>Garage RL</label><input type="number" id="targetElev" value="11.500" step="0.001"></div>
        <div class="input-group"><label>Length (m)</label><input type="number" id="totalLen" value="12.0" step="0.1"></div>
        <div class="input-group"><label>Ramp Len</label><input type="number" id="kerbLen" value="1.5" step="0.1"></div>
        <div class="input-group"><label>Ramp %</label><input type="number" id="kerbGrade" value="12.5" step="0.1"></div>
        <div class="input-group"><label>FP Width</label><input type="number" id="fpWidth" value="1.5" step="0.1"></div>
        <div class="input-group"><label>FP Grade %</label><input type="number" id="fpGrade" value="2.5" step="0.1"></div>
        <div class="input-group">
            <label>Template</label>
            <select id="vehicleType" onchange="render()"><option value="none">None</option><option value="B85">B85</option><option value="B99">B99</option></select>
        </div>
        <div class="input-group" style="align-items:center;"><label>No FP</label><input type="checkbox" id="ignoreFp"></div>
    </div>

    <svg id="profileDisplay"></svg>

    <div class="btn-group">
        <button class="btn-primary" onclick="exportDXF()">Download DXF</button>
        <button class="btn-secondary" onclick="saveProject()">Save JSON</button>
        <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">Load JSON</button>
        <input type="file" id="fileInput" style="display:none" onchange="loadProject(event)">
    </div>
</div>

<script id="worker-script" type="javascript/worker">
    const NL = String.fromCharCode(10);
    function _pt(p) { return `10${NL}${p[0].toFixed(4)}${NL}20${NL}${p[1].toFixed(4)}`; }
    self.onmessage = function(e) {
        const { pts, name } = e.data;
        let d = ['0','SECTION','2','ENTITIES','0','LWPOLYLINE','8','DESIGN','62','3','90',pts.length].join(NL);
        pts.forEach(p => d += `${NL}${_pt(p)}`);
        d += `${NL}0${NL}ENDSEC${NL}0${NL}EOF`;
        self.postMessage({ dxf: d, file: name + ".dxf" });
    };
</script>

<script>
    const vehicles = {
        B85: { wheelbase: 2.8, frontOH: 0.92, rearOH: 1.19, groundClr: 0.12, height: 1.4 },
        B99: { wheelbase: 3.05, frontOH: 0.94, rearOH: 1.21, groundClr: 0.14, height: 1.5 }
    };
    let mouseX = 200;

    function solve() {
        const cfg = {
            s: +d3.select("#startElev").property("value"),
            t: +d3.select("#targetElev").property("value"),
            len: +d3.select("#totalLen").property("value"),
            kL: +d3.select("#kerbLen").property("value"),
            kG: +d3.select("#kerbGrade").property("value")/100,
            fW: +d3.select("#fpWidth").property("value"),
            fG: +d3.select("#fpGrade").property("value")/100,
            noFP: d3.select("#ignoreFp").property("checked"),
            flat: 2.0, trans: 1.5
        };

        const dir = Math.sign(cfg.t - cfg.s);
        let res = [{x: 0, y: cfg.s}];
        let curX = 0, curY = cfg.s;

        // 1. Kerb
        curX += cfg.kL; curY += (cfg.kL * cfg.kG * dir);
        res.push({x: curX, y: curY});

        // 2. Footpath
        let gStart = cfg.kG * dir;
        if(!cfg.noFP) {
            curX += cfg.fW; curY += (cfg.fW * cfg.fG * dir);
            res.push({x: curX, y: curY});
            gStart = cfg.fG * dir;
        }

        // 3. Solver for Main Section
        const remX = cfg.len - curX - (cfg.trans * 2); 
        const mainG = (cfg.t - (curY + (cfg.trans * (gStart + 0)/2) * 2)) / remX; // Conceptual balance

        // Transition 1 (Crest/Sag)
        for(let i=1; i<=10; i++) {
            let g = gStart + (mainG - gStart) * (i/10);
            curX += (cfg.trans/10); curY += (cfg.trans/10 * g);
            res.push({x: curX, y: curY});
        }

        // Main Driveway
        curX += remX; curY += (remX * mainG);
        res.push({x: curX, y: curY});

        // Transition 2 (Garage Entry)
        for(let i=1; i<=10; i++) {
            let g = mainG + (0 - mainG) * (i/10);
            curX += (cfg.trans/10); curY += (cfg.trans/10 * g);
            res.push({x: curX, y: curY});
        }

        // 4. Garage Flat
        res.push({x: curX + cfg.flat, y: cfg.t});
        
        d3.select("#status").text(Math.abs(mainG) > 0.25 ? `EXCEEDS 25%: ${(mainG*100).toFixed(1)}%` : "");
        return res;
    }

    function render() {
        const data = solve();
        const svg = d3.select("#profileDisplay");
        const {width, height} = svg.node().getBoundingClientRect();
        const margin = {top: 40, right: 40, bottom: 40, left: 60};
        svg.selectAll("*").remove();

        const xS = d3.scaleLinear().domain([0, d3.max(data, d=>d.x)]).range([margin.left, width - margin.right]);
        const yS = d3.scaleLinear().domain([d3.min(data, d=>d.y)-0.4, d3.max(data, d=>d.y)+0.4]).range([height - margin.bottom, margin.top]);

        svg.append("path").datum(data).attr("fill", "none").attr("stroke", "#00e676").attr("stroke-width", 3).attr("d", d3.line().x(d => xS(d.x)).y(d => yS(d.y)));
        
        const vT = d3.select("#vehicleType").property("value");
        if(vT !== "none") {
            const v = vehicles[vT];
            const pX = xS.invert(mouseX);
            svg.append("rect").attr("x", xS(pX - v.rearOH)).attr("y", yS(d3.select("#targetElev").property("value") + v.height))
               .attr("width", xS(pX + v.wheelbase + v.frontOH) - xS(pX - v.rearOH)).attr("height", 30).attr("fill", "rgba(0, 230, 118, 0.2)");
        }

        svg.append("g").attr("class","axis").attr("transform",`translate(0,${height-margin.bottom})`).call(d3.axisBottom(xS));
        svg.append("g").attr("class","axis").attr("transform",`translate(${margin.left},0)`).call(d3.axisLeft(yS));
        svg.on("mousemove", (e) => { mouseX = d3.pointer(e)[0]; render(); });
    }

    const blob = new Blob([document.getElementById('worker-script').textContent], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));
    function exportDXF() { worker.postMessage({ pts: solve().map(p => [p.x, p.y]), name: d3.select("#projName").property("value") }); }
    worker.onmessage = (e) => {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([e.data.dxf], { type: 'application/dxf' }));
        a.download = e.data.file; a.click();
    };

    function saveProject() {
        const s = {}; d3.selectAll("input").each(function() { s[this.id] = this.type==='checkbox'?this.checked:this.value; });
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(s)], {type:'application/json'}));
        a.download = d3.select("#projName").property("value") + ".json"; a.click();
    }

    function loadProject(e) {
        const r = new FileReader(); r.onload = (ev) => {
            const s = JSON.parse(ev.target.result); Object.keys(s).forEach(k => {
                const el = d3.select("#"+k); if(el.property("type")==='checkbox') el.property("checked", s[k]); else el.property("value", s[k]);
            }); render();
        }; r.readAsText(e.target.files[0]);
    }

    d3.selectAll("input").on("input", render);
    render();
</script>
</body>
</html>
